<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Join SportElite today. Create an account to access elite sports gear and coaching." />
    <title>Register | SportElite – Premium Sports Equipment</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" type="image/png" href="images/favicon.png" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <script src="js/theme.js"></script>
</head>

<body>

    <div class="globe-btn-wrap" style="display: flex; flex-direction: column; gap: 10px;">
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Dark/Light Theme" title="Toggle Dark/Light Theme">
            <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5" /><line x1="12" y1="1" x2="12" y2="3" /><line x1="12" y1="21" x2="12" y2="23" /><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" /><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" /><line x1="1" y1="12" x2="3" y2="12" /><line x1="21" y1="12" x2="23" y2="12" /><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" /><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" /></svg>
            <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" /></svg>
        </button>
        <button class="globe-btn" id="globe-btn" aria-label="Toggle RTL/LTR direction" title="Toggle RTL/LTR">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <ellipse cx="12" cy="12" rx="4" ry="10" />
                <line x1="2" y1="9" x2="22" y2="9" />
                <line x1="2" y1="15" x2="22" y2="15" />
            </svg>
        </button>
    </div>

    <div class="auth-container">
        <header class="auth-header">
            <a href="index.html" class="auth-logo">
                <img src="images/logo.png" alt="SportElite Logo" />
                <span>Sport<span>Elite</span></span>
            </a>
            <h2>Join the Elite</h2>
            <p>Create your account and start your journey today</p>
        </header>

        <form class="auth-form" id="register-form">
            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" class="form-input" placeholder="John Doe" required />
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="john@example.com" required />
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" class="form-input" placeholder="(555) 123-4567" required />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="Create a password" required />
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" class="form-input" placeholder="Confirm your password"
                    required />
            </div>

            <div class="form-options">
                <label class="checkbox-wrap">
                    <input type="checkbox" id="terms" required />
                    <span>I agree to the <a href="#" class="forgot-link">Terms of Service</a> and <a href="#"
                            class="forgot-link">Privacy Policy</a></span>
                </label>
            </div>

            <button type="submit" class="btn-auth">Create Account</button>
        </form>

        <footer class="auth-footer">
            Already have an account? <a href="login.html">Login here</a>
        </footer>
    </div>

    <script>
        // RTL Toggle Logic
        const globeBtn = document.getElementById('globe-btn');
        const htmlTag = document.documentElement;

        globeBtn.addEventListener('click', () => {
            if (htmlTag.getAttribute('dir') === 'ltr') {
                htmlTag.setAttribute('dir', 'rtl');
                htmlTag.setAttribute('lang', 'ar');
            } else {
                htmlTag.setAttribute('dir', 'ltr');
                htmlTag.setAttribute('lang', 'en');
            }
        });

        // Form Submission (Mock)
        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;

            if (pass !== confirm) {
                alert('Passwords do not match!');
                return;
            }

            alert('Account created successfully! Redirecting to login...');
            window.location.href = 'login.html';
        });
    </script>
    <script src="js/main.js"></script>
</body>

</html>
